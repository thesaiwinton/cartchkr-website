[build]
  publish = "."

# Pretty URL for /faq -> /faq.html
[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

# SPA-style fallback for anything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
